<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sociogramas – Ingreso</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="icon" href="./public/icon.png" />
</head>
<body>
  <div class="login">
    <h2>Ingrese su código de estudiante</h2>
    <form id="form-login">
      <label for="codigo">Código de estudiante</label>
      <input id="codigo" type="text" placeholder="Tu código…" required autocomplete="off" />
      <button type="submit" class="btn" id="btn-entrar">Continuar</button>
    </form>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script>
    document.getElementById("form-login").addEventListener("submit", async (e) => {
      e.preventDefault();
      const codigo = document.getElementById("codigo").value.trim();
      const btn = document.getElementById("btn-entrar");
      if (!codigo) return;
      btn.disabled = true; btn.textContent = "Buscando…";
      try {
        const r = await API.login(codigo);
        if (!r.ok) {
          U.toast("Estudiante no encontrado", "error");
          return;
        }
        U.toast("Cargando cuestionario…", "success");
        setTimeout(() => {
          window.location.href = "./cuestionario.html?codigo=" + encodeURIComponent(codigo);
        }, 500);
      } catch (err) {
        console.error(err);
        U.toast("Error al cargar los datos", "error");
      } finally {
        btn.disabled = false; btn.textContent = "Continuar";
      }
    });
  </script>
</body>
</html>
